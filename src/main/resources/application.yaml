server:

  port: ${PORT} # Valor por defecto si PORT no está configurado
  url: ${SERVER_URL} # Valor por defecto si SERVER_URL no está configurado

spring:
  datasource:
    url: ${DATABASE_URL} ## Cambiar "model" por tu base de datos
    username: ${DATABASE_USERNAME} ## Cambiar por tu usuario
    password: ${DATABASE_PASSWORD} ## Cambiar por tu contraseña
    driver-class-name: ${DATABASE_DRIVER}
  
  jpa:
    database-platform: org.hibernate.dialect.SQLServerDialect
    hibernate:
      ddl-auto: none # Delegar creación al script SQL nativo para evitar duplicados/errores de FK
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
    show-sql: true # Puede true o false, para ver las consultas SQL en consola

springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html # Ruta para acceder a Swagger UI:http://localhost:4200