# docker-compose -f docker-compose-be.yml up -d
# docker-compose -f docker-compose-be.yml down
version: '3'

services:
  backend:
    image: yancarlos18/matricula-sqlserver:2.0
    container_name: matricula-backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - SERVER_URL=http://localhost:8080
      - DATABASE_URL=jdbc:sqlserver://matricula-sqlserver:1433;databaseName=MatriculaCloud360;encrypt=true;trustServerCertificate=true
      - DATABASE_USERNAME=sa
      - DATABASE_PASSWORD=Yancarlos123!
      - DATABASE_DRIVER=com.microsoft.sqlserver.jdbc.SQLServerDriver
    networks:
      - my-network

# CONSUMIR UNA RED EXISTENTE CREADA POR OTRO COMPOSE
networks:
  my-network:
    external: true   # usa la red creada por el compose de la base de datos

# Ruta para acceder a Swagger UI: http://localhost:8080/swagger-ui.html
