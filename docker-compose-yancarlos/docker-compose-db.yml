# docker-compose -f docker-compose-db.yml up -d
# docker-compose -f docker-compose-db.yml down
version: '3'

services:
  sqlserver:
    image: yancarlos18/matricula-sqlserver-db:2022
    container_name: matricula-sqlserver
    environment:
      SA_PASSWORD: "Yancarlos123!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    networks:
      - my-network

# CREAR UNA RED EN ESTE COMPOSE PARA QUE SEA COMPARTIDA
networks:
  my-network:
    name: my-network   # red compartida, visible desde ambos compose
    driver: bridge
